<style>
:root{
  --ink:#1c1c1a; --paper:#fbfaf6; --card:#ffffff; --line:#dcd8cf;
  --muted:#6f6b62; --warn:#a05c12; --warn-bg:#f8efdd;
  --r1:#4a7c59; --r2:#c08a2d; --r3:#b0492e; --r4:#33688f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.7}
.band{background:var(--ink);color:#fff;padding:18px 24px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.band h1{font-family:'Oswald','Noto Sans TC',sans-serif;font-weight:600;font-size:24px;letter-spacing:.5px}
.band .sub{font-size:13px;color:#c9c5bb}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--ink);background:var(--paper);position:sticky;top:0;z-index:1001;overflow-x:auto}
.tab{flex:1;min-width:120px;padding:12px 10px;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);border-top:4px solid transparent;white-space:nowrap}
.tab .en{display:block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tab.active{color:var(--ink);background:#fff}
.tab.active[data-route="all"]{border-top-color:var(--ink)}
.tab.active[data-route="r1"]{border-top-color:var(--r1)}
.tab.active[data-route="r2"]{border-top-color:var(--r2)}
.tab.active[data-route="r3"]{border-top-color:var(--r3)}
.tab.active[data-route="r4"]{border-top-color:var(--r4)}
.wrap{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(320px,1fr);gap:0;min-height:calc(100vh - 130px)}
#map{height:100%;min-height:460px;border-right:1px solid var(--line)}
.panel{padding:20px 22px;overflow-y:auto;background:var(--paper)}
.panel h2{font-family:'Oswald','Noto Sans TC',sans-serif;font-size:19px;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:2px}
.swatch{width:14px;height:14px;border-radius:2px;flex:none}
.panel .veh{font-size:13px;color:var(--muted);margin-bottom:14px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:var(--card);border:1px solid var(--line);padding:10px 12px}
.metric .lab{font-size:11px;letter-spacing:1px;color:var(--muted)}
.metric .val{font-family:'Oswald','Noto Sans TC',sans-serif;font-size:22px;font-weight:500}
.metric .note{font-size:11px;color:var(--muted)}
.sliderbox{background:var(--card);border:1px solid var(--line);padding:12px 14px;margin-bottom:16px}
.sliderbox label{font-size:13px;font-weight:500;display:flex;justify-content:space-between;margin-bottom:6px}
.sliderbox input[type=range]{width:100%;accent-color:var(--ink)}
.sliderbox .hint{font-size:11px;color:var(--muted);margin-top:4px}
.sec{font-family:'Oswald','Noto Sans TC',sans-serif;font-size:13px;letter-spacing:2px;font-weight:600;border-bottom:2px solid var(--ink);padding-bottom:4px;margin:18px 0 10px}
.dayrow{display:flex;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.dayrow .d{font-family:'Oswald',sans-serif;font-weight:600;flex:none;width:52px}
.dayrow .mi{flex:none;margin-left:auto;color:var(--muted);white-space:nowrap}
.stop{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;margin-bottom:6px;background:var(--card);border:1px solid var(--line);cursor:pointer;font-size:13.5px}
.stop:hover{border-color:var(--ink)}
.stop .ico{flex:none;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;margin-top:2px}
.stop .nm{font-weight:500}
.stop .nt{font-size:12.5px;color:var(--muted)}
.warnbox{background:var(--warn-bg);border-left:4px solid var(--warn);padding:10px 12px;font-size:13px;color:#5d3a0c;margin-top:14px}
.ratebar{display:flex;align-items:center;gap:8px;padding:10px 24px;background:#efece4;border-top:1px solid var(--line);font-size:13px;flex-wrap:wrap}
.ratebar input{width:70px;padding:4px 8px;border:1px solid var(--line);font-family:'Oswald',sans-serif;font-size:14px;background:#fff}
.ratebar .src{margin-left:auto;color:var(--muted);font-size:12px}
.pin{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;font-family:'Noto Sans TC',sans-serif}
.leaflet-popup-content{font-family:'Noto Sans TC',sans-serif;font-size:13px;line-height:1.6}
.leaflet-popup-content b{font-size:14px}
.legend{background:rgba(255,255,255,.94);border:1px solid var(--line);padding:8px 12px;font-size:12px;line-height:1.9;white-space:nowrap}
.legend .row{display:flex;align-items:center;gap:7px}
.legend .dot{width:12px;height:12px;border-radius:50%;flex:none}
@media (max-width:860px){
  .wrap{grid-template-columns:1fr}
  #map{min-height:52vh;border-right:none;border-bottom:1px solid var(--line)}
  .panel{max-height:none}
}
@media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style>

    + '<div class="row"><span class="dot" style="background:#a05c12"></span>油價陷阱／路況提醒</div>'
    + '<div class="row"><span class="dot" style="background:#8b8778"></span>景點／地標</div>'
    + '<div class="row"><span style="border-top:2px dashed #888;width:14px"></span>繞行或回程</div>';
  return d;
};
legend.addTo(map);

const layerGroups = {}; const markerRefs = {};
function pinIcon(kind, color){
  let bg, txt, size;
  if(kind==='fuel'){ bg='#1c1c1a'; txt='油'; size=26; }
  else if(kind==='warn'){ bg='#a05c12'; txt='!'; size=24; }
  else { bg='#8b8778'; txt='·'; size=18; }
  return L.divIcon({className:'', html:`<div class="pin" style="width:${size}px;height:${size}px;background:${bg};outline:2px solid ${color}">${txt}</div>`, iconSize:[size,size], iconAnchor:[size/2,size/2]});
}

Object.entries(ROUTES).forEach(([id,r])=>{
  const g = L.layerGroup(); markerRefs[id]=[];
  r.paths.forEach(p=>{
    L.polyline(p.pts, {color:r.color, weight:4, opacity:.85, dashArray:p.dash}).bindTooltip(p.lab,{sticky:true}).addTo(g);
  });
  r.stops.forEach((s,i)=>{
    const m = L.marker([s.lat,s.lng], {icon:pinIcon(s.k, r.color)})
      .bindPopup(`<b>${s.n}</b><br>${s.note}`);
    m.addTo(g); markerRefs[id].push(m);
  });
  layerGroups[id]=g;
});

let current='all';
function boundsOf(ids){
  let b=null;
  ids.forEach(id=>ROUTES[id].paths.forEach(p=>p.pts.forEach(pt=>{
    b = b? b.extend(pt) : L.latLngBounds(pt,pt);
  })));
  return b;
}
function show(routeId){
  current=routeId;
  Object.values(layerGroups).forEach(g=>map.removeLayer(g));
  const ids = routeId==='all'? Object.keys(ROUTES) : [routeId];
  ids.forEach(id=>layerGroups[id].addTo(map));
  map.fitBounds(boundsOf(ids).pad(0.12));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.route===routeId));
  renderPanel(routeId);
}

const fmtUSD = n=>'$'+Math.round(n).toLocaleString();
function ntRound(n){ return 'NT$'+(Math.round(n/50)*50).toLocaleString(); }
function rate(){ return parseFloat(document.getElementById('rate').value)||32; }

function calc(r, price){
  const gal = r.miles/r.mpg;
  const usd = gal*price;
  return {gal, usd, nt: usd*rate()};
}

function routeCard(id){
  const r = ROUTES[id];
  const price = r.pcur ?? r.pdef;
  const daily = r.rcur ?? r.rent.ddef;
  const c = calc(r, price);
  const rentTot = daily * r.rent.days;
  return `
  <h2><span class="swatch" style="background:${r.color}"></span>${r.name}</h2>
  <p class="veh">${r.veh}</p>
  <div class="metrics">
    <div class="metric"><div class="lab">估算里程</div><div class="val">${r.miles} <small>哩</small></div><div class="note">${(r.miles/r.mpg).toFixed(1)} 加侖</div></div>
    <div class="metric"><div class="lab">預估總油錢</div><div class="val" id="usd-${id}">${fmtUSD(c.usd)}</div><div class="note" id="nt-${id}">${ntRound(c.nt)}</div></div>
    <div class="metric"><div class="lab">租車估算（${r.rent.label}）</div><div class="val" id="rent-${id}">${fmtUSD(rentTot)}</div><div class="note">${r.rent.note}</div></div>
    <div class="metric"><div class="lab">油＋租車小計</div><div class="val" id="sub-${id}">${fmtUSD(c.usd+rentTot)}</div><div class="note" id="subnt-${id}">${ntRound((c.usd+rentTot)*rate())}</div></div>
  </div>
  <div class="sliderbox">
    <label>平均油價試算 <span id="pv-${id}" style="font-family:'Oswald'">$${price.toFixed(2)}/gal</span></label>
    <input type="range" min="${r.pmin}" max="${r.pmax}" step="0.05" value="${price}" data-route="${id}" class="pslider">
    <div class="hint">區間 $${r.pmin.toFixed(2)}–$${r.pmax.toFixed(2)}；拖動即時重算</div>
  </div>
  <div class="sliderbox">
    <label>日租金試算（${r.rent.days} 天） <span id="rv-${id}" style="font-family:'Oswald'">$${daily}/天</span></label>
    <input type="range" min="${r.rent.dlo}" max="${r.rent.dhi}" step="5" value="${daily}" data-route="${id}" class="rslider">
    <div class="hint">區間 $${r.rent.dlo}–$${r.rent.dhi}/天（含稅概數）；拿到報價後拖到實際數字</div>
  </div>
  <div class="sec">逐日走法 ITINERARY</div>
  ${r.days.map(d=>`<div class="dayrow"><span class="d">${d.d}</span><span>${d.t}</span><span class="mi">${d.mi}</span></div>`).join('')}
  <div class="sec">加油節點與地標 STOPS</div>
  ${r.stops.map((s,i)=>{
    const bg = s.k==='fuel'?'#1c1c1a': s.k==='warn'?'#a05c12':'#8b8778';
    const t = s.k==='fuel'?'油': s.k==='warn'?'!':'·';
    return `<div class="stop" data-route="${id}" data-i="${i}"><span class="ico" style="background:${bg}">${t}</span><span><span class="nm">${s.n}</span><br><span class="nt">${s.note}</span></span></div>`;
  }).join('')}
  <div class="warnbox">${r.warn}</div>`;
}

function renderPanel(routeId){
  const p = document.getElementById('panel');
  if(routeId==='all'){
    p.innerHTML = `<h2>總覽 OVERVIEW</h2>
      <p class="veh">四條路線合計試算（各以預設油價計）</p>
      ${Object.keys(ROUTES).map(id=>{
        const r=ROUTES[id]; const c=calc(r,r.pdef);
        return `<div class="stop" data-goto="${id}"><span class="ico" style="background:${r.color}">${id.slice(1)}</span><span><span class="nm">${r.name}</span><br><span class="nt">${r.miles} 哩 · ${fmtUSD(c.usd)}（${ntRound(c.nt)}）</span></span></div>`;
      }).join('')}
      <div class="sec">合計 TOTAL</div>
      <div class="metrics">
        <div class="metric"><div class="lab">四程總里程</div><div class="val" id="tot-mi"></div></div>
        <div class="metric"><div class="lab">四程總油錢</div><div class="val" id="tot-usd"></div><div class="note" id="tot-nt"></div></div>
        <div class="metric"><div class="lab">四程租車合計</div><div class="val" id="tot-rent"></div><div class="note">列 1、4 為假設天數</div></div>
        <div class="metric"><div class="lab">油＋租車總預算</div><div class="val" id="tot-all"></div><div class="note" id="tot-allnt"></div></div>
      </div>
      <div class="warnbox">油價為 2026 年 7 月初水準且持續回落中；租車為夏季含稅概數，不含保險加購（CDW 約 $15–35/天）。點各路線卡片可切換至滑桿試算。</div>`;
    let mi=0, usd=0, rlo=0, rhi=0, rcur=0;
    Object.values(ROUTES).forEach(r=>{
      mi+=r.miles; usd+=calc(r, r.pcur ?? r.pdef).usd;
      rlo+=r.rent.dlo*r.rent.days; rhi+=r.rent.dhi*r.rent.days;
      rcur+=(r.rcur ?? r.rent.ddef)*r.rent.days;
    });
    document.getElementById('tot-mi').textContent = mi.toLocaleString()+' 哩';
    document.getElementById('tot-usd').textContent = fmtUSD(usd);
    document.getElementById('tot-nt').textContent = ntRound(usd*rate());
    document.getElementById('tot-rent').textContent = fmtUSD(rcur);
    document.getElementById('tot-all').textContent = fmtUSD(usd+rcur);
    document.getElementById('tot-allnt').textContent = ntRound((usd+rcur)*rate())+'（區間 '+fmtUSD(usd+rlo)+'–'+fmtUSD(usd+rhi)+'）';
    p.querySelectorAll('[data-goto]').forEach(el=>el.addEventListener('click',()=>show(el.dataset.goto)));
  } else {
    p.innerHTML = routeCard(routeId);
    const refresh = id=>{
      const r=ROUTES[id];
      const price = r.pcur ?? r.pdef, daily = r.rcur ?? r.rent.ddef;
      const c = calc(r, price), rentTot = daily*r.rent.days;
      document.getElementById('pv-'+id).textContent='$'+price.toFixed(2)+'/gal';
      document.getElementById('rv-'+id).textContent='$'+daily+'/天';
      document.getElementById('usd-'+id).textContent=fmtUSD(c.usd);
      document.getElementById('nt-'+id).textContent=ntRound(c.nt);
      document.getElementById('rent-'+id).textContent=fmtUSD(rentTot);
      document.getElementById('sub-'+id).textContent=fmtUSD(c.usd+rentTot);
      document.getElementById('subnt-'+id).textContent=ntRound((c.usd+rentTot)*rate());
    };
    p.querySelectorAll('.pslider').forEach(sl=>sl.addEventListener('input', ()=>{
      ROUTES[sl.dataset.route].pcur = parseFloat(sl.value);
      refresh(sl.dataset.route);
    }));
    p.querySelectorAll('.rslider').forEach(sl=>sl.addEventListener('input', ()=>{
      ROUTES[sl.dataset.route].rcur = parseInt(sl.value, 10);
      refresh(sl.dataset.route);
    }));
    p.querySelectorAll('.stop[data-i]').forEach(el=>el.addEventListener('click',()=>{
      const m = markerRefs[el.dataset.route][+el.dataset.i];
      map.setView(m.getLatLng(), Math.max(map.getZoom(), 9));
      m.openPopup();
    }));
  }
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>show(t.dataset.route)));
document.getElementById('rate').addEventListener('input',()=>renderPanel(current));
show('all');
</script>
</body>
</html>
